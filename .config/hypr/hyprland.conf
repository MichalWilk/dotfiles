source = ~/.config/hypr/colors.conf

monitor = , 3840x2160, 0x0, 1.6

$terminal = alacritty
$fileManager = doublecmd-qt6 --no-splash
$menu = fuzzel
env = XCURSOR_THEME,macOS
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32
env = TERMINAL,$terminal
env = GNOME_KEYRING_CONTROL,$XDG_RUNTIME_DIR/keyring
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/keyring/ssh
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GNOME_KEYRING_CONTROL SSH_AUTH_SOCK
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
exec-once = ~/bin/gtk-init
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = udiskie --automount --notify --tray
exec-once = solaar -w hide
exec-once = lan-mouse daemon
exec-once = /usr/bin/kdeconnectd
exec-once = pike daemon
exec-once = jetbrains-toolbox --minimize
exec-once = bitwarden
exec-once = flatpak run org.signal.Signal --start-in-tray
exec-once = slack -u
exec-once = podman-desktop --minimize
exec-once = flatpak run com.discordapp.Discord --start-minimized
exec-once = flatpak run com.rtosta.zapzap --hideStart
exec-once = sh -c 'cd ~/bin/vendor/act_runner && ./act_runner daemon'
exec-once = $terminal --class com.local.scratchterm -e tmux new-session -s scratch
exec-once = $terminal --class com.local.scratchnotes -e tmux new-session -s notes nvim ~/notes
exec-once = [workspace 1 silent] brave-browser
exec-once = [workspace 2 silent] $terminal
exec-once = [workspace 9 silent] Cider
exec-once = [workspace 10 silent] thunderbird


general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $orange_a $yellow_a 45deg
    col.inactive_border = $bg2_a $bg3_a 45deg
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 14
    rounding_power = 4
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 20
        render_power = 2
        color = rgba(00000066)
        offset = 0, 4
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 0.9
        brightness = 0.82
        vibrancy = 0.15
        popups = true
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    vrr = 1
    focus_on_activate = true
}

cursor {
    inactive_timeout = 5
}

input {
    kb_layout = pl
    numlock_by_default = true
    follow_mouse = 1
    natural_scroll = true

    touchpad {
        natural_scroll = true
    }
}

layerrule = match:namespace waybar, blur 1
layerrule = match:namespace waybar, blur_popups 1
layerrule = match:namespace waybar, ignore_alpha 0.3

layerrule = match:namespace launcher, blur 1
layerrule = match:namespace launcher, blur_popups 1
layerrule = match:namespace launcher, ignore_alpha 0.1

layerrule = match:namespace swaync-notification-window, blur 1
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.3
layerrule = match:namespace swaync-control-center, blur 1
layerrule = match:namespace swaync-control-center, ignore_alpha 0.3

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, grave, togglespecialworkspace, term
bind = $mainMod SHIFT, grave, togglespecialworkspace, notes
bind = $mainMod, D, exec, $menu
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, T, togglesplit,
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, F, exec, ~/bin/focus-steal-toggle
bind = $mainMod, A, exec, $terminal --class com.local.wiremix -e wiremix
bind = $mainMod, B, exec, $terminal --class com.local.btop --title=btop -e btop
bind = $mainMod, period, exec, bitwarden
bind = $mainMod, X, exec, ~/bin/power-menu

# Logi mechanical media keys
bind = , XF86ScreenSaver, exec, loginctl lock-session
bind = , XF86Calculator, exec, qalculate-gtk
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && pkill -RTMIN+10 waybar
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, ddcutil setvcp 10 + 10
bindel = , XF86MonBrightnessDown, exec, ddcutil setvcp 10 - 10

# macOS-like screenshot layout
bind = CTRL SHIFT, 1, exec, ~/bin/screenshot fullscreen
bind = CTRL SHIFT, 2, exec, ~/bin/screenshot window
bind = CTRL SHIFT, 3, exec, ~/bin/screenshot region
bind = CTRL SHIFT, 4, exec, ~/bin/screenshot record fullscreen
bind = CTRL SHIFT, 5, exec, ~/bin/screenshot record window
bind = CTRL SHIFT, 6, exec, ~/bin/screenshot record region
bind = , Print, exec, ~/bin/screenshot toggle

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0 40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, Tab, workspace, previous

# Window grouping (tabs)
bind = $mainMod, G, togglegroup,
bind = $mainMod SHIFT, Tab, changegroupactive, f

# Logi extra hardware keys
bind = , XF86Explorer, exec, hyprctl dispatch togglespecialworkspace desktop
bind = , XF86Search, exec, $menu
bind = , XF86Favorites, exec, ~/bin/emoji-pick

# DDC/CI monitor control
bind = CTRL SHIFT, 0, exec, ~/bin/monitor input
bind = CTRL SHIFT, 9, exec, ~/bin/monitor mode

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, R, submap, resize
submap = resize
binde = , h, resizeactive, -40 0
binde = , l, resizeactive, 40 0
binde = , k, resizeactive, 0 -40
binde = , j, resizeactive, 0 40
bind = , escape, submap, reset
submap = reset

# Single window - keep gaps, no border
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]

windowrule = match:class ^(com.local.scratchterm)$, workspace special:term silent
windowrule = match:class ^(com.local.scratchnotes)$, workspace special:notes silent
windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^$, match:title ^$, match:xwayland 1, no_focus 1

# JetBrains popup workaround
windowrule = match:class ^jetbrains-.+$, match:title ^win.*, no_initial_focus 1
windowrule = match:class ^jetbrains-.+$, match:title ^win.*, rounding 0

windowrule = match:class ^jetbrains-.+$, match:title ^Welcome to .+$, float 1
windowrule = match:class ^jetbrains-.+$, match:title ^Welcome to .+$, center 1

windowrule = match:class ^(com.local.pike-tui)$, float 1
windowrule = match:class ^(com.local.pike-tui)$, size (monitor_w*0.8) (monitor_h*0.8)
windowrule = match:class ^(com.local.pike-tui)$, center 1
windowrule = match:class ^(com.local.pike-tui)$, pin 1

windowrule = match:class ^(com.local.wiremix)$, float 1
windowrule = match:class ^(com.local.wiremix)$, size 600 400
windowrule = match:class ^(com.local.wiremix)$, center 1
windowrule = match:class ^(com.local.wiremix)$, pin 1

windowrule = match:title ^(btop)$, float 1
windowrule = match:title ^(btop)$, size (monitor_w*0.8) (monitor_h*0.8)
windowrule = match:title ^(btop)$, center 1
windowrule = match:title ^(btop)$, pin 1

windowrule = match:class ^(doublecmd-qt)$, match:initial_title ^(doublecmd-qt)$, float 1
windowrule = match:class ^(doublecmd-qt)$, match:initial_title ^(doublecmd-qt)$, center 1
windowrule = match:class ^(doublecmd-qt)$, match:initial_title ^(doublecmd-qt)$, pin 1

windowrule = match:class ^(nm-connection-editor)$, float 1
windowrule = match:class ^(blueman-manager)$, float 1
windowrule = match:title ^(Open File)$, float 1
windowrule = match:title ^(Save As)$, float 1
