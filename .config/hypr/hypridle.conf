general {
    lock_cmd = wl-copy -c; swaync-client --dnd-on; pidof hyprlock || hyprlock
    unlock_cmd = swaync-client --dnd-off
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock after 10 min
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Monitor off shortly after lock
listener {
    timeout = 610
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 3 min idle past lock
listener {
    timeout = 780
    on-timeout = systemctl suspend
}
