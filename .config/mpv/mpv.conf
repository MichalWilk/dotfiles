# Video
vo=gpu-next
gpu-api=vulkan
hwdec=vaapi

# Audio
volume=80
volume-max=150
audio-pitch-correction=yes

# OSD
osd-font="Inter"
osd-font-size=28
osd-color="#e8e4dd"
osd-border-color="#1a1918"
osd-border-size=2
osd-bar-align-y=0.95
osd-duration=2000

# Subtitles
sub-auto=fuzzy
sub-font="Inter"
sub-font-size=40
sub-color="#e8e4dd"
sub-border-color="#1a1918"
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color="#80000000"
slang=pl,pol,en,eng

# Window
keep-open=yes
autofit-larger=90%x90%
cursor-autohide=1000

# Screenshot
screenshot-format=png
screenshot-directory=~/Pictures/Screenshots
screenshot-template="%F-%P"

# Cache
cache=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB

# YouTube / streaming
ytdl-format=bestvideo[height<=?1440]+bestaudio/best
