include current-theme.conf

# Font
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11
modify_font cell_height 110%

# Force Nerd Font powerline glyphs to render at full cell width
symbol_map U+E0B0-U+E0BF JetBrainsMono Nerd Font

# Window
background_opacity 0.75
window_padding_width 8 12
hide_window_decorations yes
confirm_os_window_close -1

# Scrollback
scrollback_lines 10000
scrollback_pager bat --paging=always --style=plain

# Bell
enable_audio_bell no

# Clipboard & URLs
copy_on_select clipboard
detect_urls yes

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2

# Keybindings - tabs
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Keybindings - splits
map ctrl+shift+enter new_window
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Keybindings - font size
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

# Keybindings - scrollback pager
map ctrl+shift+g show_scrollback
