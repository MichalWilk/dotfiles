# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -as terminal-features 'alacritty:extkeys'
set -g allow-passthrough on
set -g extended-keys on
set -g set-clipboard on
set -g focus-events on
set -g mouse on
set -sg escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Home/End keys
bind-key -n Home send Escape "[H"
bind-key -n End send Escape "[F"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ember theme
set -g status-position bottom
set -g status-style "bg=#1a1918,fg=#9a9491"
set -g status-left "#[bg=#fe8019,fg=#1a1918,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#[fg=#c0bab5,bg=#3e3c3a] %H:%M "
set -g status-right-length 20
setw -g window-status-format "#[fg=#6a6765] #I:#W "
setw -g window-status-current-format "#[fg=#fe8019,bg=#3e3c3a,bold] #I:#W #[default]"
setw -g window-status-separator ""
set -g pane-border-style "fg=#6a6765"
set -g pane-active-border-style "fg=#fe8019"
set -g message-style "bg=#fe8019,fg=#1a1918"
set -g message-command-style "bg=#1a1918,fg=#fe8019"
setw -g mode-style "bg=#fe8019,fg=#1a1918"
